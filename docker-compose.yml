services:
  sipbot:
    image: ghcr.io/aminraay/smart-voice-assistant:latest
    container_name: sipbot
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - ES_HOST=${ES_HOST}
      - ES_PORT=${ES_PORT:-9200}
      - ES_USERNAME=${ES_USERNAME:-elastic}
      - ES_PASSWORD=${ES_PASSWORD}
      - ES_USE_SSL=${ES_USE_SSL:-false}
      - ES_VERIFY_CERTS=${ES_VERIFY_CERTS:-false}
      - ELASTIC_INDEX_PREFIX=${ELASTIC_INDEX_PREFIX:-pjsua-calls}
      - LOG_LEVEL=${LOG_LEVEL:-3}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # SIP Configuration (required)
      - SIP_USER=${SIP_USER}
      - SIP_AUTH_USER=${SIP_AUTH_USER:-${SIP_USER}}
      - SIP_PASSWORD=${SIP_PASSWORD}
      - SIP_DOMAIN=${SIP_DOMAIN}
      - SIP_TRANSPORT=${SIP_TRANSPORT:-udp}
      - SIP_LOCAL_PORT=${SIP_LOCAL_PORT:-0}
      - SIP_WAIT_SECONDS=${SIP_WAIT_SECONDS:-20}
      - SIP_MESSAGE_DURATION=${SIP_MESSAGE_DURATION:-8}
      - SIP_HANGUP_DELAY=${SIP_HANGUP_DELAY:-2}
      - SIP_SILENCE_AFTER_SPEECH_SEC=${SIP_SILENCE_AFTER_SPEECH_SEC:-3.0}
      - SIP_VAD_THRESHOLD=${SIP_VAD_THRESHOLD:-0.5}
      - RECORDING_PATH=${RECORDING_PATH:-/app/recordings}
      # Ollama Configuration
      - INTENT_CLASSIFIER=${INTENT_CLASSIFIER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - OLLAMA_USE_CPU=${OLLAMA_USE_CPU:-}
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    # Add extra_hosts to make host.docker.internal work on Linux/WSL2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Note: user switching is handled by docker-entrypoint.sh
    # This allows the entrypoint to fix permissions on mounted volumes
    volumes:
      - ./recordings:/app/recordings
      - ./logs:/app/logs
      - ./.env:/app/src/.env:ro
      - ./cache:/app/.cache
    networks:
      - smart-voice-assistance

networks:
  smart-voice-assistance:
    name: smart-voice-assistance
