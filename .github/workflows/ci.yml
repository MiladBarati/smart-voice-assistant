name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 black==24.8.0

      - name: Run Ruff (check)
        run: ruff check .

      - name: Run Ruff (format check)
        run: ruff format --check .

      - name: Run Black (check)
        run: black --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install type checking dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy==1.11.2
          # Ensure project deps + stub packages are available for mypy.
          pip install -e .
          pip install "types-requests<2.32.0.20240521"

      - name: Run mypy
        run: mypy src tests
        continue-on-error: false

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies with uv
        id: install-uv
        continue-on-error: true
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Install dependencies with pip (fallback)
        if: steps.install-uv.outcome == 'failure'
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest>=8.4.2 pytest-cov>=7.0.0

      - name: Run pytest with coverage
        run: |
          pytest \
            -m "not elasticsearch and not pjsua" \
            --cov=pjsua_bot \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml \
            --cov-fail-under=25 \
            --cov-branch \
            --verbose \
            --tb=short

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .pytest_cache/
          retention-days: 7

