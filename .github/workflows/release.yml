name: Build

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/smart-voice-assistant:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 120m
          script: |
            set -e
            cd /home/aminry/app
            echo "=== Stopping existing containers ==="
            docker compose down || true
            
            echo "=== Pulling Docker images (this may take 10-20 minutes for large images) ==="
            echo "Start time: $(date)"
            
            # Set Docker client timeout to 2 hours (7200 seconds)
            export DOCKER_CLIENT_TIMEOUT=7200
            export COMPOSE_HTTP_TIMEOUT=7200
            
            # Retry logic for docker compose pull (up to 3 attempts)
            MAX_RETRIES=3
            RETRY_COUNT=0
            PULL_SUCCESS=false
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$PULL_SUCCESS" = false ]; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "=== Pull attempt $RETRY_COUNT of $MAX_RETRIES ==="
              
              if docker compose pull --progress=plain; then
                PULL_SUCCESS=true
                echo "=== Pull completed successfully ==="
              else
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "=== Pull failed, waiting 30 seconds before retry ==="
                  sleep 30
                else
                  echo "=== Pull failed after $MAX_RETRIES attempts ==="
                  exit 1
                fi
              fi
            done
            
            echo "End time: $(date)"
            echo "=== Starting containers ==="
            docker compose up -d