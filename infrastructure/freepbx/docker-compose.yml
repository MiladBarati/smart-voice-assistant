services:
  freepbx-app:
    container_name: freepbx-app
    image: tiredofit/freepbx
    network_mode: "host"
    volumes:
      - freepbx_certs:/certs
      - freepbx_data:/data
      - freepbx_logs:/var/log
      - freepbx_www:/var/www/html
      ### You can drop custom files overtop of the image if you have made modifications to modules/css/whatever - Use with care
      #- ./assets/custom:/assets/custom

    environment:
      - VIRTUAL_HOST=hostname.example.com
      ### If you want to connect to the SSL Enabled Container
      #- VIRTUAL_PORT=443
      #- VIRTUAL_PROTO=https
      - VIRTUAL_PORT=80
      - ENABLE_ZABBIX=FALSE
      - RTP_START=18000
      - RTP_FINISH=18100
      - DB_EMBEDDED=FALSE ## Use for External MySQL Server

      ### These are only necessary if DB_EMBEDDED=FALSE
      - DB_HOST=178.239.151.95
      - DB_PORT=3306
      - DB_NAME=asterisk
      - DB_USER=asterisk
      - DB_PASS=fyrkekykt&rCVpGkPASS

      ### If you are using TLS Support for Apache to listen on 443 in the container drop them in /certs and set these:
      #- TLS_CERT=cert.pem
      #- TLS_KEY=key.pem
    restart: always
    ### These final lines are for Fail2ban. If you don't want, comment and also add ENABLE_FAIL2BAN=FALSE to your environment
    cap_add:
      - NET_ADMIN
    privileged: true
  freepbx-db:
    container_name: freepbx-db
    image: tiredofit/mariadb
    network_mode: "host"
    restart: always
    volumes:
      - freepbx_db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=nD!35*Edt9mrBvV*
      - MYSQL_DATABASE=asterisk
      - MYSQL_USER=asterisk
      - MYSQL_PASSWORD=fyrkekykt&rCVpGkPASS

volumes:
  freepbx_certs:
    driver: local
  freepbx_data:
    driver: local
  freepbx_logs:
    driver: local
  freepbx_www:
    driver: local
  freepbx_db_data:
    driver: local
