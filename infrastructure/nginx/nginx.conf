# Default server - Reject all requests to IP or unknown domains
server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;
    
    # Dummy SSL certificates (required for default_server with SSL)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Reject all requests
    return 444;
}

# ========== Recordings Service ==========
# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name recordings.aminraay.ir;
    
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server for recordings
server {
    listen 443 ssl http2;
    server_name recordings.aminraay.ir;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Enable autoindex to list files
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Request size limit
    client_max_body_size 100M;

    location /recordings/ {
        alias /usr/share/nginx/html/recordings/;
        
        # Allow access only to audio files
        location ~ \.(wav|mp3|ogg|flac)$ {
            add_header Content-Type audio/wav;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}

# ========== Kibana Service ==========
# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name kibana.aminraay.ir;
    
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server for Kibana
server {
    listen 443 ssl http2;
    server_name kibana.aminraay.ir;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Request size limit
    client_max_body_size 100M;

    # Proxy to Kibana
    location / {
        proxy_pass http://kibana:5601;
        proxy_http_version 1.1;
        
        # WebSocket support (for Kibana real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Forward real IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
    }
}