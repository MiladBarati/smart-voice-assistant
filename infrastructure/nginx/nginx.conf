# Default server - Reject all requests to IP or unknown domains
server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;
    
    # Dummy SSL certificates (required for default_server with SSL)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # Reject all requests
    return 444;
}

# Redirect HTTP to HTTPS for correct domain only
server {
    listen 80;
    server_name recordings.aminraay.ir;
    
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server - Only responds to recordings.aminraay.ir
server {
    listen 443 ssl http2;
    server_name recordings.aminraay.ir;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Enable autoindex to list files
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Request size limit
    client_max_body_size 100M;

    location /recordings/ {
        alias /usr/share/nginx/html/recordings/;
        
        # Allow access only to audio files
        location ~ \.(wav|mp3|ogg|flac)$ {
            add_header Content-Type audio/wav;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=3600";
        }
        
        # Deny access to hidden files
        location ~ /\. {
            deny all;
        }
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}