services:
  nginx-recordings:
    image: nginx:alpine
    container_name: nginx-recordings
    ports:
      - "443:443" # HTTPS port
    volumes:
      - /home/aminry/app/recordings:/usr/share/nginx/html/recordings:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./aminraay.ir/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - ./aminraay.ir/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    networks:
      - elk-stack_elk
    restart: unless-stopped

networks:
  elk-stack_elk:
    external: true
