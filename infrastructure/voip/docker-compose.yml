services:
  asterisk:
    image: mlan/asterisk:full
    container_name: voip-asterisk
    restart: unless-stopped
    hostname: asterisk.lab.local

    # Security capabilities
    cap_add:
      - NET_ADMIN # Required for AutoBan (nftables)
      - NET_RAW # Required for AutoBan
      - SYS_PTRACE # Debugging support

    # Network ports
    ports:
      - "8080:80" # WebSMS interface
      - "5060:5060/udp" # SIP UDP
      - "5060:5060/tcp" # SIP TCP
      - "5061:5061/tcp" # SIP TLS
      - "10000-10099:10000-10099/udp" # RTP ports (limited range)

    # Environment variables
    environment:
      - SYSLOG_LEVEL=5 # Logging level (5=warning)
      - HOSTNAME=asterisk.lab.local
      - WEBSMSD_PORT=80 # WebSMS port
      - TLS_KEYBITS=2048 # TLS key size
      - TLS_CERTDAYS=365 # Self-signed cert validity
      - PUID=1000 # User ID
      - PGID=1000 # Group ID
      - TZ=Asia/Tehran # Timezone

    # Persistent volumes
    volumes:
      - asterisk-config:/srv # Main config storage
      - asterisk-logs:/var/log/asterisk # Logs
      - /etc/localtime:/etc/localtime:ro # System timezone

    # Health check
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    networks:
      - voip-network

  # Optional: Web management interface (FreePBX style)
  # Uncomment if you want GUI management
  # freepbx:
  #   image: tiredofit/freepbx:latest
  #   container_name: voip-freepbx
  #   restart: unless-stopped
  #   ports:
  #     - "8081:80"
  #     - "5160:5060/udp"
  #   environment:
  #     - DB_EMBEDDED=TRUE
  #     - ENABLE_FAIL2BAN=TRUE
  #   volumes:
  #     - freepbx-data:/data
  #     - freepbx-logs:/var/log
  #   networks:
  #     - voip-network

# Persistent storage volumes
volumes:
  asterisk-config:
    driver: local
  asterisk-logs:
    driver: local
  # freepbx-data:
  #   driver: local
  # freepbx-logs:
  #   driver: local

# Network definition
networks:
  voip-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
